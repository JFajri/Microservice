server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      mvc: # Gunakan mvc: jika server: webmvc: tadi tidak jalan
        routes:
          - id: PRODUK
            uri: lb://PRODUK
            predicates:
              - Path=/api/produk/**
          
          - id: ORDER-SERVICE
            uri: lb://ORDER
            predicates:
              - Path=/api/order/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/